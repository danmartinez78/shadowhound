name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble
      - name: Install vcstool
        run: sudo apt-get update && sudo apt-get install -y python3-vcstool
      - name: Import sources
        run: mkdir -p src && vcs import src < shadowhound.repos
      - name: Rosdep
        run: rosdep install --from-paths src -iry

      - name: Build
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: humble
          package-name: |
            shadowhound_mission_agent
            shadowhound_utils

      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose

      - name: Upload build and test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-logs
          path: |
            log/
            build/
            test_results/
