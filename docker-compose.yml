version: "3.9"
services:
  shadowhound:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    network_mode: host
    env_file: [.env]
    profiles: ["laptop"]
  shadowhound-thor:
    build:
      context: .
      dockerfile: docker/Dockerfile.thor
    runtime: nvidia
    network_mode: host
    env_file: [.env]
    profiles: ["thor"]
